<div class="signup-page" role="main">
  <div class="signup-card">
    <!-- Brand -->
    <div class="signup-brand">
      <span class="brand-icon" aria-hidden="true">&#9685;</span>
      <h1 class="brand-name">VitalsDrive</h1>
      <p class="brand-tagline text-secondary text-sm">Start your fleet management journey</p>
    </div>

    <!-- Error Display -->
    @if (error()) {
      <div class="error-banner" role="alert">
        <mat-icon>error_outline</mat-icon>
        <span>{{ error() }}</span>
      </div>
    }

    <!-- Form -->
    <form
      class="signup-form"
      (ngSubmit)="onSubmit()"
      novalidate
      aria-label="Sign up form"
    >
      <button
        mat-raised-button
        color="primary"
        type="submit"
        class="signup-btn"
        [disabled]="isLoading()"
        aria-label="Create account with Auth0"
      >
        @if (isLoading()) {
          Creating account...
        } @else {
          Sign Up with Auth0
        }
      </button>
    </form>

    <p class="signup-footer text-secondary text-sm">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
