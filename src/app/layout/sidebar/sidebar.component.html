<nav class="sidebar" role="navigation" aria-label="Main navigation">
  <!-- Logo -->
  <div class="sidebar-brand">
    <span class="sidebar-brand-icon">&#9685;</span>
    <div class="sidebar-brand-text">
      <span class="sidebar-brand-name">VitalsDrive</span>
      <span class="sidebar-brand-tagline">Fleet Health</span>
    </div>
  </div>

  <!-- Fleet summary -->
  <div class="fleet-summary">
    <div class="fleet-stat">
      <span class="fleet-stat-value text-healthy">{{ vehicleCount() }}</span>
      <span class="fleet-stat-label">Online</span>
    </div>
    <div class="fleet-stat-divider"></div>
    <div class="fleet-stat">
      <span
        class="fleet-stat-value"
        [class.text-critical]="alertVehicleCount() > 0"
        [class.text-muted]="alertVehicleCount() === 0"
      >
        {{ alertVehicleCount() }}
      </span>
      <span class="fleet-stat-label">Alerts</span>
    </div>
  </div>

  <!-- Navigation -->
  <ul class="nav-list" role="list">
    @for (item of navItems; track item.route) {
      <li>
        <a
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="nav-item--active"
          [attr.aria-label]="item.label + (item.badgeSignal ? ': ' + item.badgeSignal() + ' alerts' : '')"
          (click)="onNavClick()"
        >
          <mat-icon
            class="nav-icon"
            [attr.aria-hidden]="true"
          >
            {{ item.icon }}
          </mat-icon>
          <span class="nav-label">{{ item.label }}</span>
          @if (item.badgeSignal && item.badgeSignal() > 0) {
            <span class="nav-badge" aria-hidden="true">
              {{ item.badgeSignal() }}
            </span>
          }
        </a>
      </li>
    }
  </ul>

  <!-- Footer -->
  <div class="sidebar-footer">
    <span class="sidebar-version text-muted text-xs">v1.0.0</span>
  </div>
</nav>
