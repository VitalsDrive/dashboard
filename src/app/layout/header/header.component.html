<header class="header" role="banner">
  <div class="header-left">
    <button
      mat-icon-button
      class="menu-toggle"
      (click)="onMenuToggle()"
      [attr.aria-label]="sidenavOpen() ? 'Close menu' : 'Open menu'"
      [attr.aria-expanded]="sidenavOpen()"
    >
      <mat-icon>{{ sidenavOpen() ? 'menu_open' : 'menu' }}</mat-icon>
    </button>

    <a routerLink="/dashboard" class="brand" aria-label="VitalsDrive Home">
      <img src="assets/logo-mark.svg" class="brand-icon" width="28" height="28" alt="">
      <span class="brand-name">VitalsDrive</span>
    </a>
  </div>

  <div class="header-right">
    <!-- Connection status -->
    <div
      class="connection-status"
      [class.connected]="connectionStatus() === 'connected'"
      [class.disconnected]="connectionStatus() === 'disconnected'"
      [class.reconnecting]="connectionStatus() === 'reconnecting'"
      [matTooltip]="'Realtime: ' + connectionStatus()"
      role="status"
      [attr.aria-label]="'Connection status: ' + connectionStatus()"
    >
      <span class="connection-dot"></span>
      @if (!isMobile()) {
        <span class="connection-label">{{ connectionStatus() }}</span>
      }
    </div>

    <!-- Bell badge: unacknowledged DB alerts -->
    <button
      mat-icon-button
      routerLink="/alerts"
      class="alert-btn"
      [matBadge]="unacknowledgedCount()"
      [matBadgeHidden]="unacknowledgedCount() === 0"
      matBadgeColor="warn"
      matBadgeSize="small"
      [matBadgePosition]="'above after'"
      matBadgeMax="99"
      aria-label="View alerts"
      matTooltip="Alerts"
    >
      <mat-icon aria-hidden="true">notifications</mat-icon>
    </button>
  </div>
</header>
