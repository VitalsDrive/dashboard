<mat-sidenav-container class="shell-container">
  <mat-sidenav
    class="shell-sidenav"
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="sidenavOpen()"
    [fixedInViewport]="true"
    [fixedTopGap]="0"
  >
    <app-sidebar (navItemClicked)="isMobile() && toggleSidenav()" />
  </mat-sidenav>

  <mat-sidenav-content class="shell-content">
    <app-header
      [isMobile]="isMobile()"
      [sidenavOpen]="sidenavOpen()"
      (menuToggled)="toggleSidenav()"
    />

    <div class="shell-connection-pill" style="
      position: absolute;
      top: 14px;
      right: 140px;
      z-index: 100;
    ">
      <vd-connection-pill [state]="connectionStatus()" />
    </div>

    <app-alert-banner />

    <main id="main-content" class="shell-main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>

<app-toast />
