<div class="login-page" role="main">
  <div class="login-card">
    <!-- Brand -->
    <div class="login-brand">
      <span class="brand-icon" aria-hidden="true">&#9685;</span>
      <h1 class="brand-name">VitalsDrive</h1>
      <p class="brand-tagline text-secondary text-sm">
        Fleet Health, Simplified.
      </p>
    </div>

    <!-- Error Display -->
    @if (error()) {
      <div class="error-banner" role="alert">
        <mat-icon>error_outline</mat-icon>
        <span>{{ error() }}</span>
      </div>
    }

    <!-- Sign In -->
    <div class="login-form">
      <button
        mat-raised-button
        color="primary"
        type="button"
        class="login-btn"
        [disabled]="isLoading()"
        (click)="onSubmit()"
        aria-label="Sign in with Auth0"
      >
        @if (isLoading()) {
          Signing in...
        } @else {
          Sign In with Auth0
        }
      </button>
    </div>

    <p class="login-footer text-secondary text-sm">
      Don't have an account? <a routerLink="/signup">Create one</a>
    </p>
  </div>
</div>
